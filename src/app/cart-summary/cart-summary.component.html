<div class="summary-container">
  <h3>Resumen del Pedido</h3>

  <div class="summary-row">
    <span>Subtotal</span>
    <span>{{ subtotal | currency:'EUR' }}</span>
  </div>

  <div class="summary-row" *ngIf="discount > 0">
    <span class="discount-label">Descuento</span>
    <span class="discount-amount">-{{ discount | currency:'EUR' }}</span>
  </div>

  <div class="summary-row">
    <span>Gastos de envío</span>
    <span>{{ shippingCost === 0 && postalCode.substring(0,2) === '28' ? 'Gratis' : (shippingCost | currency:'EUR') }}</span>
  </div>

  <hr class="divider">

  <div class="summary-row total-row">
    <span>Total</span>
    <span class="total-price">{{ total | currency:'EUR' }}</span>
  </div>

  <div class="input-section">
    <label for="postalCode">Calcular Envío (Prueba con 28 o 08)</label>
    <div class="input-group">
      <input 
        type="text" 
        id="postalCode" 
        [(ngModel)]="postalCode" 
        placeholder="Ej: 28001" 
        maxlength="5">
      <button (click)="onCalculateShipping()">Calcular</button>
    </div>
  </div>

  <div class="input-section">
    <label for="coupon">¿Tienes un cupón?</label>
    <div class="input-group">
      <input 
        type="text" 
        id="coupon" 
        [(ngModel)]="couponCode" 
        placeholder="Ej: DESCUENTO10">
      <button (click)="onApplyCoupon()">Aplicar</button>
    </div>
    <p *ngIf="couponMessage" [class.success-msg]="isCouponValid" [class.error-msg]="!isCouponValid">
      {{ couponMessage }}
    </p>
  </div>

  <button class="btn-checkout" [disabled]="total === 0">
    Proceder al Pago
  </button>
</div>
