@if (authService.isLoggedIn()) {
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow border-bottom border-secondary-subtle py-3">
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home">
          <span class="fs-3 fw-black text-white letter-spacing-tight">
            Re<span class="text-success">Market</span>
          </span>
        </a>

        <!-- Botón hamburguesa para móvil -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Enlaces -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
            <li class="nav-item">
              <a class="nav-link px-3 py-2 rounded-pill fw-semibold text-light" routerLink="/home" routerLinkActive="active bg-success text-white">
                <i class="bi bi-house-door me-1"></i> Inicio
              </a>
            </li>
            <li class="nav-item ms-lg-2">
              <a class="nav-link px-3 py-2 rounded-pill fw-semibold text-light" routerLink="/anuncio/nuevo" routerLinkActive="active bg-success text-white">
                <i class="bi bi-plus-circle me-1"></i> Publicar Anuncio
              </a>
            </li>
            <li class="nav-item ms-lg-2 d-lg-none">
              <a class="nav-link px-3 py-2 rounded-pill fw-semibold text-light" routerLink="/dashboard" routerLinkActive="active bg-success text-white">
                <i class="bi bi-person-circle me-1"></i> Mi Panel
              </a>
            </li>
          </ul>

          <!-- Info de Usuario y Cierre de Sesión -->
          <div class="d-flex align-items-center gap-3">
            <a routerLink="/dashboard" class="text-decoration-none text-light d-none d-sm-block" style="cursor: pointer;">
              <span class="opacity-75">Hola, </span>
              <strong class="text-success text-decoration-underline">{{ authService.currentUser()?.username }}</strong> <i class="bi bi-person-circle ms-1 text-success"></i>
            </a>
            
            <button (click)="logout()" class="btn btn-outline-danger btn-sm px-3 py-2 rounded-pill fw-semibold shadow-sm d-flex align-items-center gap-1">
              <i class="bi bi-box-arrow-right"></i> Salir
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>
}

@if (authService.isLoggedIn()) {
  <main class="container my-5 pb-5">
    <router-outlet />
  </main>
  <footer class="bg-dark border-top border-secondary-subtle text-muted text-center py-4 mt-auto">
    <div class="container">
      <p class="mb-1 text-light-emphasis small">&copy; 2026 ReMarket UNIR. Proyecto Final de Carrera.</p>
      <small class="text-muted">Desarrollado con Angular, Node.js y MySQL</small>
    </div>
  </footer>
} @else {
  <router-outlet />
}
