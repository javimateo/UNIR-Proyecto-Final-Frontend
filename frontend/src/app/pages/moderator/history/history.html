<div class="container">

    <h1>Historial de Moderación</h1>

    <p class="subtitle">

        Consulta todas las acciones realizadas durante las tareas de moderación.

    </p>

    <div class="table-responsive">

    <table>

        <thead>

            <tr>

                <th>Fecha</th>
                <th>Hora</th>
                <th>Acción</th>
                <th>Artículo</th>
                <th>Usuario</th>
                <th>Resultado</th>

            </tr>

        </thead>

        <tbody>

            @for(item of historial; track item){

            <tr>

                <td>{{item.fecha}}</td>

                <td>{{item.hora}}</td>

                <td>{{item.accion}}</td>

                <td>{{item.producto}}</td>

                <td>{{item.usuario}}</td>

                <td>

                    <span
                    [class.green]="item.resultado=='Mantenido'"
                    [class.red]="item.resultado=='Retirado'"
                    [class.blue]="item.resultado=='Resuelta'">

                        {{item.resultado}}

                    </span>

                </td>

            </tr>

            }

        </tbody>

    </table>

    </div>

</div>
