<div class="container">

    <h1>Detalle del reporte</h1>

    <div class="content">

        <div class="image">

            <img [src]="reporte.imagen">

        </div>

        <div class="info">

            <h2>{{reporte.producto}}</h2>

            <p><strong>Precio:</strong> {{reporte.precio}} €</p>

            <p><strong>Vendedor:</strong> {{reporte.vendedor}}</p>

            <p><strong>Ubicación:</strong> {{reporte.ubicacion}}</p>

            <p><strong>Estado:</strong> {{reporte.estado}}</p>

            <hr>

            <h3>Descripción</h3>

            <p>{{reporte.descripcion}}</p>

            <hr>

            <h3>Motivo del reporte</h3>

            <div class="warning">

                {{reporte.motivo}}

            </div>

            <div class="buttons">

                <a routerLink="/notification" class="approve">

                    Mantener anuncio

                </a>

                <a routerLink="/notification" class="delete">

                    Retirar anuncio

                </a>

            </div>

        </div>

    </div>

</div>
