<form [formGroup]="loginForm" (ngSubmit)="getDataForm()">

  <div class="mb-3">
    <label class="form-label fw-bold">Correo Electrónico</label>
    <input 
      type="email" 
      formControlName="email" 
      class="form-control"
      placeholder="Introduce tu correo"
      
    />
    @if(checkControl('email','required')){
      <p class="error">Campo obligatorio</p>
    }
    @if (checkControl('email','pattern')) {
      <p class="error">El email no es válido</p>
    }
  </div>

  <div class="mb-4">
    <label class="form-label fw-bold">Contraseña</label>
    <input 
      type="password" 
      formControlName="password" 
      class="form-control"
      placeholder="Introduce tu contraseña"
      
    />
    @if (checkControl('password','required')) {
      <p class="error">Contraseña requerida</p>
    }
    @if (checkControl('password','minlength')) {
      <p class="error">La contraseña debe tener al menos 8 carácteres</p>
    }
  </div>

  <div class="d-grid">
    <button 
      type="submit" 
      class="btn btn-primary btn-lg"
      [disabled]="loginForm.invalid"
    >
      Login
    </button>
  </div>

</form>
