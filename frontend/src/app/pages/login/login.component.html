<div class="login-wrapper">

  <!-- Logo encima de la card -->
  <div class="brand">
    <div class="brand-icon">RM</div>
    <span class="brand-name">Re<span class="brand-market">Market</span></span>
  </div>

  <div class="login-card">

    <!-- Tabs -->
    <div class="tabs">
      <button
        type="button"
        class="tab-btn"
        [class.active]="mostrarLogin"
        (click)="mostrarLogin = true"
      >
        <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="!mostrarLogin"
        (click)="mostrarLogin = false"
      >
        <i class="bi bi-person-plus me-1"></i> Registrarse
      </button>
    </div>

    <!-- Forms -->
    <div class="form-area">
      @if (mostrarLogin) {
        <app-login-form></app-login-form>
      } @else {
        <app-register-form></app-register-form>
      }
    </div>

  </div>
</div>
