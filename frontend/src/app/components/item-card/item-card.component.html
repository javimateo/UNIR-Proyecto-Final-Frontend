<div class="card h-100 shadow-sm border-0 rounded-4 bg-white overflow-hidden product-card">
  
  <!-- 1. BLOQUE DE LA IMAGEN -->
  <div class="card-img-container position-relative overflow-hidden bg-light">
    @if (item().cover_photo) {
      <img [src]="item().cover_photo" 
           [alt]="item().title" 
           class="card-img-top product-image">
    } @else {
      <div class="d-flex flex-column justify-content-center align-items-center h-100 text-muted p-5" style="min-height: 220px;">
        <i class="bi bi-image fs-1 mb-2"></i>
        <span>Sin imágenes</span>
      </div>
    }
    
    <!-- 👁️ CAPA DE HOVER: Ver Detalle (Se activa al pasar el ratón) -->
    <div class="product-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
         [routerLink]="['/anuncio', item().id]"> 
         <!-- ⚠️ Nota: Cambia '/items' por la ruta exacta que uses en tu app (ej: '/home', '/item-detail') -->
      <button class="btn btn-light rounded-pill px-4 py-2 fw-bold shadow d-flex align-items-center gap-2 view-detail-btn">
        <i class="bi bi-eye-fill text-success"></i>
        Ver detalle
      </button>
    </div>
    
    <!-- Botones e iconos flotantes estándar (quedan por encima de la capa) -->
    <span class="badge bg-info position-absolute top-0 start-0 m-3 z-3">
      {{ item().item_condition }}
    </span>
    <button class="btn btn-light rounded-circle position-absolute top-0 end-0 m-3 shadow-sm z-3" style="width: 36px; height: 36px; padding: 0;">
      <i class="bi bi-heart"></i>
    </button>
  </div>

  <!-- 2. BLOQUE DE TEXTO -->
  <div class="card-body p-3 d-flex flex-column justify-content-between">
    <div>
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-primary small fw-semibold text-uppercase">{{ item().category_name }}</span>
        <span class="text-muted small">11/06/2026</span>
      </div>
      
      <h5 class="card-title fw-bold text-dark text-truncate mb-3" [title]="item().title" [routerLink]="['/anuncio', item().id]" style="cursor: pointer;">
        {{ item().title }}
      </h5>
    </div>
    
    <div class="d-flex flex-column mt-auto">
      <span class="text-muted small mb-0">Precio</span>
      <span class="fs-4 fw-extrabold text-success">{{ item().price }} €</span>
    </div>
  </div>

</div>
